{% extends "pages/base.html" %}

{% block title %}Password Reset Failed | PlaylistWise AI{% endblock %}

{% block content %}
    <h1>Reset Password Failed</h1>
    <p>The password reset link is invalid or has expired. Please try requesting a new password reset.</p>
    <div class="actions">
        <a class="btn btn-secondary" href="{{ forgot_url }}">Request New Link</a>
        <a class="btn btn-primary" href="{{ login_url }}">Go to Login</a>
    </div>
{% endblock %}
