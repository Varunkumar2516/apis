<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Email Verified</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{

            width:500px;

            background:white;

            border-radius:20px;

            padding:50px;

            text-align:center;

            box-shadow:0 10px 40px rgba(0,0,0,.08);

        }

        .icon{

            width:90px;

            height:90px;

            border-radius:50%;

            background:#e8fff0;

            margin:auto;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:50px;

            color:#22c55e;

        }

        h1{

            margin-top:25px;

            color:#222;

            font-size:32px;

        }

        p{

            margin-top:18px;

            color:#666;

            line-height:1.7;

            font-size:17px;

        }

        a{

            display:inline-block;

            margin-top:35px;

            background:#5B4BFF;

            color:white;

            text-decoration:none;

            padding:15px 35px;

            border-radius:10px;

            font-weight:bold;

            transition:.3s;
        }

        a:hover{

            background:#4636ff;

        }

        .footer{

            margin-top:35px;

            color:#888;

            font-size:14px;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="icon">
        ✓
    </div>

    <h1>Email Verified!</h1>

    <p>

        Hi <strong>{{ username }}</strong>,

        <br><br>

        Your email has been verified successfully.

        <br>

        Your PlaylistWise AI account is now active.

    </p>

    <a href="{{ login_url }}">
        Go to Login
    </a>

    <div class="footer">

        <strong>PlaylistWise AI</strong>

        <br>

        Learn Smart. Grow Fast.

    </div>

</div>

</body>

</html>
