{% extends "pages/base.html" %}
{% block title %}Reset Password | PlaylistWise AI{% endblock %}

{% block content %}
  <h1>Reset Your Password</h1>
  <p>Please enter your new password below. </p>

  <div id="error-message" style="color: red; margin-bottom: 10px; min-height: 20px;">
    {% if error %}{{ error }}{% endif %}
  </div>

  <form id="reset-password-form" method="POST" action="/password/reset-password">
    <input type="hidden" id="token" name="token" value="{{ token }}">

    <label for="new_password">New Password:</label><br>
    <div style="position: relative; width: 100%; margin-top: 6px;">
      <input type="password" id="new_password" name="new_password" required
             style="width:100%; padding:10px 40px 10px 10px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
      <span id="toggle-new-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none;">👁️</span>
    </div>
    <br>

    <label for="confirm_password">Confirm Password:</label><br>
    <div style="position: relative; width: 100%; margin-top: 6px;">
      <input type="password" id="confirm_password" name="confirm_password" required
             style="width:100%; padding:10px 40px 10px 10px; border:1px solid #cbd5e1; border-radius:6px; box-sizing: border-box;">
      <span id="toggle-confirm-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none;">👁️</span>
    </div>

    <div class="actions" style="margin-top: 24px;">
      <button type="submit" id="submit-button" class="btn btn-primary">
        Reset Password
      </button>
    </div>
  </form>

  <script>
    // --- Eye Icon Toggle Visibility Logic ---
    function setupPasswordToggle(inputFieldId, toggleIconId) {
      const passwordInput = document.getElementById(inputFieldId);
      const toggleIcon = document.getElementById(toggleIconId);

      toggleIcon.addEventListener('click', function() {
        // Toggle the type attribute
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          toggleIcon.textContent = '🙈'; // Change icon when visible
        } else {
          passwordInput.type = 'password';
          toggleIcon.textContent = '👁️'; // Change back to normal eye
        }
      });

      // Explicitly guarantee copy/paste permissions are unblocked on these fields
      passwordInput.addEventListener('paste', (e) => e.stopPropagation());
      passwordInput.addEventListener('copy', (e) => e.stopPropagation());
    }

    // Initialize visibility toggles for both fields
    setupPasswordToggle('new_password', 'toggle-new-password');
    setupPasswordToggle('confirm_password', 'toggle-confirm-password');


    // --- Form Submission Logic ---
    document.getElementById('reset-password-form').addEventListener('submit', async function(event) {
      event.preventDefault();

      const newPwd = document.getElementById('new_password').value;
      const confirmPwd = document.getElementById('confirm_password').value;
      const token = document.getElementById('token').value;
      const errorMsg = document.getElementById('error-message');
      
      errorMsg.textContent = '';

      if (newPwd !== confirmPwd) {
        errorMsg.textContent = 'Passwords do not match.';
        return; 
      }

      if (newPwd.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters long.';
        return;
      }

      try {
        const response = await fetch('/password/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token: token,
            new_password: newPwd,
            confirm_password: confirmPwd
          })
        });

        if (response.ok) {
            const htmlContent = await response.text();
            document.open();
            document.write(htmlContent);
            document.close();
        } else {
          const data = await response.json();
          errorMsg.textContent = data.detail || 'An error occurred on the server.';
        }
      } catch (err) {
        errorMsg.textContent = 'Failed to connect to the server. Try again later.';
      }
    });
  </script>
{% endblock %}
