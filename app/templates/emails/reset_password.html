{% extends "emails/base.html" %}

{% block content %}

<h1>

Reset Password

</h1>

<p>

Hi {{ username }},

</p>

<p>

We received a request to reset your password.

</p>

<center>

<a
href="{{ reset_link }}"
class="button">

Reset Password

</a>

</center>

<p>

This link expires in
<strong>5 minutes</strong>.

</p>

<div class="link">

{{ reset_link }}

</div>

<p>

If you didn't request this, you can safely ignore this email.

</p>

{% endblock %}
