<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="backend-url" content="%REACT_APP_BACKEND_URL%" />
<title>Sign up — PlaylistWise AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-side">
    <a href="/" class="logo"><span class="logo-mark"><i class="ph ph-brain"></i></span><span>PlaylistWise.AI</span></a>
    <div>
      <h2>Turn any playlist into a <span class="grad-text">private tutor</span>.</h2>
      <p>Join thousands of learners using AI to extract notes, ask questions, and master playlists 10x faster.</p>
    </div>
    <p style="color:var(--text-muted);font-size:0.85rem;position:relative;z-index:1">© 2026 PlaylistWise AI</p>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-card fade-in">
      <h2>Create your account</h2>
      <p class="sub">Free forever, no credit card required</p>
      <form id="signup-form">
        <div class="form-group"><label for="name">Full Name</label><input class="input" id="name" required placeholder="Jane Doe" data-testid="signup-name-input" /></div>
        <div class="form-group"><label for="email">Email</label><input class="input" type="email" id="email" required placeholder="you@example.com" data-testid="signup-email-input" /></div>
        <div class="form-group"><label for="password">Password</label><input class="input" type="password" id="password" required minlength="6" placeholder="At least 6 characters" data-testid="signup-password-input" /></div>
        <div class="form-group"><label for="confirm">Confirm Password</label><input class="input" type="password" id="confirm" required minlength="6" placeholder="Repeat password" data-testid="signup-confirm-input" /></div>
        <label class="check-row" style="margin-bottom:18px"><input type="checkbox" id="terms" required data-testid="signup-terms-checkbox" /> I agree to the <a href="#" class="auth-link">Terms</a> and <a href="#" class="auth-link">Privacy</a></label>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" data-testid="signup-submit-btn"><span class="btn-label">Create Account</span></button>
      </form>
      <div class="divider">or continue with</div>
      <button class="btn btn-glass" style="width:100%;justify-content:center" data-testid="signup-google-btn" onclick="PW.toast('Google signup coming soon', 'info')"><i class="ph ph-google-logo"></i> Continue with Google</button>
      <p style="text-align:center;margin-top:22px;color:var(--text-secondary);font-size:0.9rem">Already have one? <a href="login.html" class="auth-link" data-testid="signup-to-login-link">Sign in</a></p>
    </div>
  </div>
</div>
<script src="script.js"></script>
<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('password').value, cf = document.getElementById('confirm').value;
  if (pw !== cf) return PW.toast('Passwords do not match', 'error');
  const btn = e.target.querySelector('button[type=submit]');
  const lbl = btn.querySelector('.btn-label');
  btn.disabled = true; lbl.textContent = 'Creating...';
  try {
    const data = await PW.api('/auth/register', { method: 'POST', body: JSON.stringify({
      full_name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: pw
    })});
    PW.setAuth(data.token, data.user);
    PW.toast('Account created!', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 500);
  } catch (err) { PW.toast(err.message, 'error'); btn.disabled = false; lbl.textContent = 'Create Account'; }
});
</script>
</body>
</html>
